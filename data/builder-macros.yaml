# an npm component library (vite lib build -> dist/, published to Verdaccio) and a
# Storybook docs site (build-storybook -> storybook-static/, served from Swift). It
# reuses nodejs-install/lint/build-clean; the four builders below add Storybook
# testing, a per-patchset Storybook preview, the Storybook deploy, and npm publish.
